name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: verify (lint + typecheck + test + build + ai:validate + validate:inputs)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --reporter=default --reporter=junit --outputFile.junit=./test-results/junit.xml

      - name: Build
        run: npm run build

      - name: AI config validate
        run: npm run ai:validate

      - name: Validate tool contracts
        run: npm run validate:inputs

      - name: Audit prod-deps
        run: npm run audit:prod
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ github.run_id }}
          path: test-results/junit.xml
          retention-days: 7
